name: Windows Build and Tests

on:
  pull_request:
  push:
    branches:
      - main
      - develop
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: iuis-windows-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  reconcile-pass12-readiness:
    name: Reconcile Pass 12 readiness assertions
    if: github.event_name == 'pull_request' && github.head_ref == 'build/pass-12-student-service-persistence' && github.actor != 'github-actions[bot]'
    runs-on: windows-latest
    outputs:
      changed: ${{ steps.reconcile.outputs.changed }}
    steps:
      - name: Check out exact feature branch
        uses: actions/checkout@v4
        with:
          ref: build/pass-12-student-service-persistence
          fetch-depth: 0

      - name: Apply exact reconciliation and restore workflow baseline
        id: reconcile
        shell: pwsh
        run: |
          $ErrorActionPreference = 'Stop'

          function Replace-ExactOnce {
              param(
                  [Parameter(Mandatory = $true)][string]$Path,
                  [Parameter(Mandatory = $true)][string]$Old,
                  [Parameter(Mandatory = $true)][string]$New
              )

              $content = [System.IO.File]::ReadAllText($Path).Replace("`r`n", "`n")
              $matches = [regex]::Matches($content, [regex]::Escape($Old)).Count
              if ($matches -ne 1) {
                  throw "Expected exactly one target block in $Path but found $matches."
              }

              [System.IO.File]::WriteAllText(
                  $Path,
                  $content.Replace($Old, $New),
                  [System.Text.UTF8Encoding]::new($false))
          }

          $pass9Old = "                Assert.AreEqual(`n                    11,`n                    readiness.Count(item =>`n                        item.Readiness`n                        == AggregateMapperReadiness.SpecializedMapperCompleted));`n                Assert.AreEqual(`n                    7,`n                    readiness.Count(item =>`n                        item.Readiness`n                        == AggregateMapperReadiness.DeferredWithExplicitReason));"
          $pass9New = "                Assert.AreEqual(`n                    13,`n                    readiness.Count(item =>`n                        item.Readiness`n                        == AggregateMapperReadiness.SpecializedMapperCompleted));`n                Assert.AreEqual(`n                    5,`n                    readiness.Count(item =>`n                        item.Readiness`n                        == AggregateMapperReadiness.DeferredWithExplicitReason));"
          Replace-ExactOnce `
              'tests/IUIS.Tests/Pass9ApplicationInfrastructureTests.cs' `
              $pass9Old `
              $pass9New

          $activationOld = "                    `"assessments`",`n                    `"courses`"," 
          $activationNew = "                    `"assessments`",`n                    `"books`",`n                    `"borrowings`",`n                    `"courses`"," 
          Replace-ExactOnce `
              'tests/IUIS.Tests/Pass10ClosureIntegrityTests.cs' `
              $activationOld `
              $activationNew

          $pass10 = [System.IO.File]::ReadAllText(
              'tests/IUIS.Tests/Pass10CanonicalPersistenceTests.cs')
          if ($pass10 -notmatch 'ReadinessCatalogActivatesExactlyThirteenSpecializedMappers' `
              -or $pass10 -notmatch '(?s)Assert\.AreEqual\(\s*13,.*SpecializedMapperCompleted' `
              -or $pass10 -notmatch '(?s)Assert\.AreEqual\(\s*5,.*DeferredWithExplicitReason') {
              throw 'The Pass 10 canonical readiness assertion is not reconciled to 13 completed and 5 deferred.'
          }

          git fetch origin develop
          git checkout origin/develop -- '.github/workflows/windows-build.yml'
          if (Test-Path '.github/workflows/pass12-readiness-reconciliation.yml') {
              git rm '.github/workflows/pass12-readiness-reconciliation.yml'
          }

          git config user.name 'github-actions[bot]'
          git config user.email '41898282+github-actions[bot]@users.noreply.github.com'
          git add `
              '.github/workflows/windows-build.yml' `
              'tests/IUIS.Tests/Pass9ApplicationInfrastructureTests.cs' `
              'tests/IUIS.Tests/Pass10CanonicalPersistenceTests.cs' `
              'tests/IUIS.Tests/Pass10ClosureIntegrityTests.cs'
          git commit -m 'test(pass12): reconcile readiness assertions after Library activation'
          git push origin HEAD:build/pass-12-student-service-persistence
          "changed=true" >> $env:GITHUB_OUTPUT

  release-build:
    name: Release MSBuild and MSTest
    needs: reconcile-pass12-readiness
    if: always() && (needs.reconcile-pass12-readiness.result == 'skipped' || needs.reconcile-pass12-readiness.outputs.changed != 'true')
    runs-on: windows-latest
    timeout-minutes: 25

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Add MSBuild to PATH
        uses: microsoft/setup-msbuild@v2

      - name: Add NuGet to PATH
        uses: NuGet/setup-nuget@v2
        with:
          nuget-version: '6.x'

      - name: Validate source tree and architecture
        shell: pwsh
        run: ./build/Test-IuisSourceTree.ps1

      - name: Restore NuGet packages
        shell: pwsh
        run: nuget restore IUIS.sln -NonInteractive -Verbosity detailed

      - name: Build Release and execute tests
        shell: pwsh
        run: ./build/Invoke-IuisBuild.ps1 -Configuration Release

      - name: Upload build and test evidence
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: iuis-windows-build-evidence-${{ github.run_number }}
          path: |
            artifacts/logs/**
            artifacts/TestResults/**
            artifacts/validation/**
            artifacts/bin/Release/**
          if-no-files-found: warn
          retention-days: 14
