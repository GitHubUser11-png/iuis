name: Windows Build and Tests

on:
  pull_request:
  push:
    branches:
      - main
      - develop
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: iuis-windows-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  corrective-reconcile:
    name: Reconcile strict Pass 11 schema test
    if: github.actor != 'github-actions[bot]'
    runs-on: ubuntu-latest

    steps:
      - name: Check out corrective branch
        uses: actions/checkout@v4
        with:
          ref: build/pass-11-corrective-closure
          fetch-depth: 0

      - name: Replace obsolete unversioned-record expectation
        shell: bash
        run: |
          python - <<'PY'
          from pathlib import Path

          path = Path('tests/IUIS.Tests/Pass10CanonicalPersistenceTests.cs')
          text = path.read_text(encoding='utf-8')
          start_marker = '''        [TestMethod]
        public void MapperMigratesUnversionedCanonicalRecordToVersionOne()
        {'''
          end_marker = '''

        [TestMethod]
        public void MapperRejectsUnsupportedRecordSchemaVersion()'''
          start = text.find(start_marker)
          end = text.find(end_marker, start)
          if start < 0 or end < 0:
              raise RuntimeError('The obsolete Pass 10 schema regression block was not found.')
          replacement = '''        [TestMethod]
        public void MapperRejectsUnversionedCanonicalRecord()
        {
            var options = JsonOptions();
            var source = JsonSerializer.SerializeToElement(
                new PersistedCourseRecord
                {
                    RecordSchemaVersion = 0,
                    Id = "CRS-2026-000011",
                    Version = 1,
                    CreatedAtUtc = Now,
                    CreatedByUserId = "USR-2026-000001",
                    UpdatedAtUtc = Now,
                    UpdatedByUserId = "USR-2026-000001",
                    Code = "BSCS",
                    Name = "Bachelor of Science in Computer Science",
                    DepartmentId = "DEPT-CS",
                    DurationYears = 4,
                    Status = CourseStatus.Draft.ToString()
                },
                options);

            Assert.ThrowsException<InvalidOperationException>(() =>
                new CourseJsonMapper().FromJson(source, options));
        }'''
          path.write_text(text[:start] + replacement + text[end:], encoding='utf-8')
          PY

          rm -f .github/workflows/pass11-corrective-patch.yml
          rm -f .github/workflows/pass11-corrective-pr-runner.yml
          rm -f .github/workflows/pass11-corrective-test-contract-fix.yml
          rm -f .github/workflows/pass11-corrective-test-reconcile.yml
          rm -f .github/pass11-patch-error.txt
          git show origin/main:.github/workflows/windows-build.yml > .github/workflows/windows-build.yml

      - name: Commit clean corrective head
        shell: bash
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add -A
          git commit -m "test(pass11): reject unversioned persisted records"
          git push origin HEAD:build/pass-11-corrective-closure

  release-build:
    name: Release MSBuild and MSTest
    runs-on: windows-latest
    timeout-minutes: 25

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Add MSBuild to PATH
        uses: microsoft/setup-msbuild@v2

      - name: Add NuGet to PATH
        uses: NuGet/setup-nuget@v2
        with:
          nuget-version: '6.x'

      - name: Validate source tree and architecture
        shell: pwsh
        run: ./build/Test-IuisSourceTree.ps1

      - name: Restore NuGet packages
        shell: pwsh
        run: nuget restore IUIS.sln -NonInteractive -Verbosity detailed

      - name: Build Release and execute tests
        shell: pwsh
        run: ./build/Invoke-IuisBuild.ps1 -Configuration Release

      - name: Upload build and test evidence
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: iuis-windows-build-evidence-${{ github.run_number }}
          path: |
            artifacts/logs/**
            artifacts/TestResults/**
            artifacts/validation/**
            artifacts/bin/Release/**
          if-no-files-found: warn
          retention-days: 14
