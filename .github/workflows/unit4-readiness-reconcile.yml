name: Unit 4 Readiness Reconciliation

on:
  pull_request:
    branches:
      - develop

permissions:
  contents: write

concurrency:
  group: unit4-readiness-${{ github.event.pull_request.number }}
  cancel-in-progress: false

jobs:
  reconcile:
    if: github.event.pull_request.head.repo.full_name == github.repository
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.event.pull_request.head.ref }}
          fetch-depth: 0

      - name: Reconcile final mapper readiness assertions
        shell: bash
        run: |
          python - <<'PY'
          from pathlib import Path
          import re

          def replace_exact(path, old, new):
              p = Path(path)
              text = p.read_text(encoding='utf-8')
              count = text.count(old)
              if count != 1:
                  raise RuntimeError(f'{path}: expected exactly one exact block, found {count}')
              p.write_text(text.replace(old, new), encoding='utf-8', newline='')

          def replace_regex(path, pattern, replacement):
              p = Path(path)
              text = p.read_text(encoding='utf-8')
              updated, count = re.subn(pattern, replacement, text, flags=re.S)
              if count != 1:
                  raise RuntimeError(f'{path}: expected exactly one regex block, found {count}')
              p.write_text(updated, encoding='utf-8', newline='')

          replace_exact(
              'tests/IUIS.Tests/Pass9ApplicationInfrastructureTests.cs',
              '''                Assert.AreEqual(
                    16,
                    readiness.Count(item =>
                        item.Readiness == AggregateMapperReadiness.SpecializedMapperCompleted));
                Assert.AreEqual(
                    2,
                    readiness.Count(item =>
                        item.Readiness == AggregateMapperReadiness.DeferredWithExplicitReason));''',
              '''                Assert.AreEqual(
                    18,
                    readiness.Count(item =>
                        item.Readiness == AggregateMapperReadiness.SpecializedMapperCompleted));
                Assert.AreEqual(
                    0,
                    readiness.Count(item =>
                        item.Readiness == AggregateMapperReadiness.DeferredWithExplicitReason));''')

          replace_exact(
              'tests/IUIS.Tests/Pass10CanonicalPersistenceTests.cs',
              '''        public void ReadinessCatalogActivatesExactlySixteenSpecializedMappers()
        {
            var records = AggregateMapperReadinessCatalog.All;
            Assert.AreEqual(18, records.Count);
            Assert.AreEqual(
                16,
                records.Count(item => item.Readiness == AggregateMapperReadiness.SpecializedMapperCompleted));
            Assert.AreEqual(
                2,
                records.Count(item => item.Readiness == AggregateMapperReadiness.DeferredWithExplicitReason));''',
              '''        public void ReadinessCatalogActivatesExactlyEighteenSpecializedMappers()
        {
            var records = AggregateMapperReadinessCatalog.All;
            Assert.AreEqual(18, records.Count);
            Assert.AreEqual(
                18,
                records.Count(item => item.Readiness == AggregateMapperReadiness.SpecializedMapperCompleted));
            Assert.AreEqual(
                0,
                records.Count(item => item.Readiness == AggregateMapperReadiness.DeferredWithExplicitReason));''')

          replace_exact(
              'tests/IUIS.Tests/Pass10ClosureIntegrityTests.cs',
              '''                    "clearances",
                    "courses",
                    "employees",''',
              '''                    "clearances",
                    "counseling",
                    "courses",
                    "discipline_incidents",
                    "employees",''')

          replace_exact(
              'tests/IUIS.Tests/Pass11EnvelopeTokenFinanceTests.cs',
              '''        public void ReadinessCatalogReflectsPass12ClinicMedicalActivation()
        {
            Assert.AreEqual(
                16,
                AggregateMapperReadinessCatalog.All.Count(item =>
                    item.Readiness == AggregateMapperReadiness.SpecializedMapperCompleted));
            Assert.AreEqual(
                2,
                AggregateMapperReadinessCatalog.All.Count(item =>
                    item.Readiness == AggregateMapperReadiness.DeferredWithExplicitReason));
        }''',
              '''        public void ReadinessCatalogReflectsFinalPass12Activation()
        {
            Assert.AreEqual(
                18,
                AggregateMapperReadinessCatalog.All.Count(item =>
                    item.Readiness == AggregateMapperReadiness.SpecializedMapperCompleted));
            Assert.AreEqual(
                0,
                AggregateMapperReadinessCatalog.All.Count(item =>
                    item.Readiness == AggregateMapperReadiness.DeferredWithExplicitReason));
        }''')

          replace_regex(
              'tests/IUIS.Tests/Pass12StudentServiceSchemaTests.cs',
              r'''        \[TestMethod\]\n        public void TwoAdaptersRemainFailClosedAfterClinicMedicalActivation\(\)\n        \{.*?\n        \}\n\n        \[TestMethod\]\n        public void CanonicalJsonNamesExposeSegregatedCollections''',
              '''        [TestMethod]
        public void AllAdaptersAreSpecializedAfterFinalActivation()
        {
            var records = AggregateMapperReadinessCatalog.All;
            var completed = records
                .Where(item => item.Readiness == AggregateMapperReadiness.SpecializedMapperCompleted)
                .Select(item => item.AdapterName)
                .ToList();
            var deferred = records
                .Where(item => item.Readiness == AggregateMapperReadiness.DeferredWithExplicitReason)
                .ToList();

            Assert.AreEqual(18, completed.Count);
            Assert.AreEqual(0, deferred.Count);
            CollectionAssert.Contains(completed, "CounselingCaseRepositoryAdapter");
            CollectionAssert.Contains(completed, "DisciplineCaseRepositoryAdapter");
        }

        [TestMethod]
        public void CanonicalJsonNamesExposeSegregatedCollections''')

          replace_regex(
              'tests/IUIS.Tests/Pass12LibraryPersistenceTests.cs',
              r'''        \[TestMethod\]\n        public void MapperReadinessIncludesLibraryAndClinicMedicalAdapters\(\)\n        \{.*?\n        \}\n\n        \[TestMethod\]\n        public void IssueStagesBookAndBorrowingInOneTransaction''',
              '''        [TestMethod]
        public void MapperReadinessIncludesAllStudentServiceAdapters()
        {
            var completed = AggregateMapperReadinessCatalog.All
                .Where(item => item.Readiness == AggregateMapperReadiness.SpecializedMapperCompleted)
                .Select(item => item.AdapterName)
                .ToList();
            var deferred = AggregateMapperReadinessCatalog.All
                .Where(item => item.Readiness == AggregateMapperReadiness.DeferredWithExplicitReason)
                .ToList();

            Assert.AreEqual(18, completed.Count);
            CollectionAssert.Contains(completed, "LibraryBookRepositoryAdapter");
            CollectionAssert.Contains(completed, "LibraryBorrowingRepositoryAdapter");
            CollectionAssert.Contains(completed, "ClinicAppointmentRepositoryAdapter");
            CollectionAssert.Contains(completed, "MedicalRecordRepositoryAdapter");
            CollectionAssert.Contains(completed, "MedicalClearanceRepositoryAdapter");
            CollectionAssert.Contains(completed, "CounselingCaseRepositoryAdapter");
            CollectionAssert.Contains(completed, "DisciplineCaseRepositoryAdapter");
            Assert.AreEqual(0, deferred.Count);
        }

        [TestMethod]
        public void IssueStagesBookAndBorrowingInOneTransaction''')

          replace_regex(
              'tests/IUIS.Tests/Pass12ClinicMedicalIntegrationTests.cs',
              r'''        \[TestMethod\]\n        public void MapperReadinessMovesToSixteenCompletedAndTwoDeferred\(\)\n        \{.*?\n        \}\n\n        \[TestMethod\]\n        public void CompositionRootRestartPreservesClinicMedicalRepositories''',
              '''        [TestMethod]
        public void MapperReadinessMovesToEighteenCompletedAndZeroDeferred()
        {
            var completed = AggregateMapperReadinessCatalog.All
                .Where(item => item.Readiness == AggregateMapperReadiness.SpecializedMapperCompleted)
                .Select(item => item.AdapterName)
                .ToList();
            var deferred = AggregateMapperReadinessCatalog.All
                .Where(item => item.Readiness == AggregateMapperReadiness.DeferredWithExplicitReason)
                .ToList();

            Assert.AreEqual(18, completed.Count);
            CollectionAssert.Contains(completed, "ClinicAppointmentRepositoryAdapter");
            CollectionAssert.Contains(completed, "MedicalRecordRepositoryAdapter");
            CollectionAssert.Contains(completed, "MedicalClearanceRepositoryAdapter");
            CollectionAssert.Contains(completed, "CounselingCaseRepositoryAdapter");
            CollectionAssert.Contains(completed, "DisciplineCaseRepositoryAdapter");
            Assert.AreEqual(0, deferred.Count);
        }

        [TestMethod]
        public void CompositionRootRestartPreservesClinicMedicalRepositories''')
          PY

      - name: Commit reconciled tests and remove maintenance workflow
        shell: bash
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git rm .github/workflows/unit4-readiness-reconcile.yml
          git add tests/IUIS.Tests
          git commit -m "test(pass12): reconcile final 18-of-18 mapper readiness"
          git push --force-with-lease origin HEAD:${{ github.event.pull_request.head.ref }}
