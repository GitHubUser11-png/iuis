name: Apply Pass 11 Corrective Closure Patch

on:
  push:
    branches:
      - build/pass-11-corrective-closure

permissions:
  contents: write

jobs:
  apply-corrective-patch:
    if: github.actor != 'github-actions[bot]'
    runs-on: ubuntu-latest
    steps:
      - name: Check out corrective branch
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Apply source and test corrections
        shell: bash
        run: |
          python - <<'PY'
          from pathlib import Path
          from textwrap import dedent

          def replace_once(path, old, new):
              file_path = Path(path)
              text = file_path.read_text(encoding="utf-8")
              count = text.count(old)
              if count != 1:
                  raise RuntimeError(f"Expected one match in {path}, found {count}.")
              file_path.write_text(text.replace(old, new), encoding="utf-8")

          mapper_path = Path("src/IUIS.Infrastructure/Persistence/SpecializedAggregateJsonMappers.cs")
          mapper_text = mapper_path.read_text(encoding="utf-8")
          old_mapper_guard = dedent('''\
                      if (record.RecordSchemaVersion != 0
                          && record.RecordSchemaVersion != CurrentRecordSchemaVersion)
          ''')
          new_mapper_guard = dedent('''\
                      if (record.RecordSchemaVersion != CurrentRecordSchemaVersion)
          ''')
          if old_mapper_guard not in mapper_text:
              raise RuntimeError("Persisted record schema guard did not match the expected Pass 11 baseline.")
          mapper_path.write_text(mapper_text.replace(old_mapper_guard, new_mapper_guard, 1), encoding="utf-8")

          command_path = Path("src/IUIS.Application/Orchestration/EnrollmentFinanceCommandServices.cs")
          command_text = command_path.read_text(encoding="utf-8")
          old_allocation_contract = dedent('''\
              public sealed class PaymentAllocationInput
              {
                  public string AssessmentId { get; set; }
                  public decimal Amount { get; set; }
              }
          ''')
          new_allocation_contract = dedent('''\
              public sealed class PaymentAllocationInput
              {
                  public string AssessmentId { get; set; }
                  public long ExpectedAssessmentEntityVersion { get; set; }
                  public decimal Amount { get; set; }
              }
          ''')
          if old_allocation_contract not in command_text:
              raise RuntimeError("Payment allocation contract did not match the expected Pass 11 baseline.")
          command_text = command_text.replace(old_allocation_contract, new_allocation_contract, 1)

          payment_start_marker = dedent('''\
                              if (request.Allocations == null || request.Allocations.Count == 0)
          ''')
          payment_end_marker = "                    payment.Post(receiptNumber, utcNow, principal.UserId);"
          start = command_text.find(payment_start_marker)
          if start < 0:
              raise RuntimeError("Payment validation block start was not found.")
          end_start = command_text.find(payment_end_marker, start)
          if end_start < 0:
              raise RuntimeError("Payment validation block end was not found.")
          end = end_start + len(payment_end_marker)
          new_payment_block = dedent('''\
                              if (request.Allocations == null || request.Allocations.Count == 0)
                                  throw new ArgumentException(
                                      "At least one Payment allocation is required.",
                                      nameof(request));
                              var allocationInputs = request.Allocations.ToList();
                              if (allocationInputs.Any(item => item == null))
                                  throw new ArgumentException(
                                      "Payment allocation input is required.",
                                      nameof(request));

                              var amount = new Money(request.Amount, request.CurrencyCode);
                              if (allocationInputs.Sum(item => item.Amount) != amount.Amount)
                                  throw new InvalidOperationException(
                                      "Payment allocations must equal the Payment amount.");

                              var assessmentIds = new HashSet<string>(StringComparer.Ordinal);
                              foreach (var allocationInput in allocationInputs)
                              {
                                  var assessment = EnrollmentFinanceCommandGuard.Find(
                                      assessmentSnapshot.Records,
                                      allocationInput.AssessmentId,
                                      "Tuition Assessment");
                                  EnrollmentFinanceCommandGuard.RequireVersion(
                                      allocationInput.ExpectedAssessmentEntityVersion,
                                      assessment.Version,
                                      "Tuition Assessment");
                                  if (!assessmentIds.Add(assessment.Id))
                                      throw new InvalidOperationException(
                                          "A Payment can contain only one allocation for each Assessment.");
                                  if (allocationInput.Amount <= 0m)
                                      throw new InvalidOperationException(
                                          "Payment allocation amounts must be greater than zero.");
                                  new Money(allocationInput.Amount, request.CurrencyCode);
                                  if (assessment.Status != TuitionAssessmentStatus.Posted
                                      || !StringComparer.Ordinal.Equals(
                                          assessment.StudentId,
                                          request.StudentId)
                                      || !StringComparer.Ordinal.Equals(
                                          assessment.AcademicPeriodId,
                                          request.AcademicPeriodId))
                                  {
                                      throw new InvalidOperationException(
                                          "Each Payment allocation must target a Posted Assessment for the same Student and Academic Period.");
                                  }
                              }

                              var payment = new Payment(
                                  _ids.Allocate("PAY", utcNow.Year, principal.UserId),
                                  request.StudentId,
                                  request.AcademicPeriodId,
                                  amount,
                                  request.Method,
                                  request.ReceivedAtUtc,
                                  request.ExternalReference,
                                  utcNow,
                                  principal.UserId);
                              foreach (var allocationInput in allocationInputs)
                              {
                                  payment.AddAllocation(
                                      new PaymentAllocation(
                                          _ids.Allocate("PAL", utcNow.Year, principal.UserId),
                                          allocationInput.AssessmentId,
                                          new Money(
                                              allocationInput.Amount,
                                              request.CurrencyCode)),
                                      utcNow,
                                      principal.UserId);
                              }

                              var receiptNumber = _ids.Allocate(
                                  "RCT",
                                  utcNow.Year,
                                  principal.UserId);
                              if (paymentSnapshot.Records.Any(item =>
                                  StringComparer.Ordinal.Equals(
                                      item.ReceiptNumber,
                                      receiptNumber)))
                              {
                                  throw new InvalidOperationException(
                                      "The allocated receipt number already exists.");
                              }
                              payment.Post(receiptNumber, utcNow, principal.UserId);
          ''')
          command_text = command_text[:start] + new_payment_block + command_text[end:]
          command_path.write_text(command_text, encoding="utf-8")

          query_path = Path("src/IUIS.Application/Orchestration/StudentFinanceQueryService.cs")
          query_text = query_path.read_text(encoding="utf-8")
          replacements = [
              (
                  ".Where(item => StringComparer.Ordinal.Equals(item.StudentId, studentId))\n                .OrderByDescending(item => item.UpdatedAtUtc)\n                .Select(ToEnrollment)",
                  ".Where(item => StringComparer.Ordinal.Equals(item.StudentId, studentId)\n                    && IsStudentVisible(item))\n                .OrderByDescending(item => item.UpdatedAtUtc)\n                .Select(ToEnrollment)"
              ),
              (
                  ".Where(item => StringComparer.Ordinal.Equals(item.StudentId, studentId))\n                .OrderByDescending(item => item.UpdatedAtUtc)\n                .ToList();\n            var paymentRecords",
                  ".Where(item => StringComparer.Ordinal.Equals(item.StudentId, studentId)\n                    && IsStudentVisible(item))\n                .OrderByDescending(item => item.UpdatedAtUtc)\n                .ToList();\n            var paymentRecords"
              ),
              (
                  ".Where(item => StringComparer.Ordinal.Equals(item.StudentId, studentId))\n                .OrderByDescending(item => item.ReceivedAtUtc)\n                .ToList();\n            var adjustmentRecords",
                  ".Where(item => StringComparer.Ordinal.Equals(item.StudentId, studentId)\n                    && IsStudentVisible(item))\n                .OrderByDescending(item => item.ReceivedAtUtc)\n                .ToList();\n            var adjustmentRecords"
              ),
              (
                  ".Where(item => StringComparer.Ordinal.Equals(item.StudentId, studentId))\n                .OrderByDescending(item => item.UpdatedAtUtc)\n                .ToList();\n            var scholarshipRecords",
                  ".Where(item => StringComparer.Ordinal.Equals(item.StudentId, studentId)\n                    && IsStudentVisible(item))\n                .OrderByDescending(item => item.UpdatedAtUtc)\n                .ToList();\n            var scholarshipRecords"
              ),
              (
                  ".Where(item => StringComparer.Ordinal.Equals(item.StudentId, studentId))\n                .OrderByDescending(item => item.UpdatedAtUtc)\n                .ToList();\n\n            var currencyCode",
                  ".Where(item => StringComparer.Ordinal.Equals(item.StudentId, studentId)\n                    && IsStudentVisible(item))\n                .OrderByDescending(item => item.UpdatedAtUtc)\n                .ToList();\n\n            var currencyCode"
              )
          ]
          for old, new in replacements:
              if query_text.count(old) != 1:
                  raise RuntimeError("Student Finance projection baseline did not match an expected lifecycle filter location.")
              query_text = query_text.replace(old, new, 1)

          projection_marker = "        private static StudentEnrollmentDto ToEnrollment(Enrollment value)"
          projection_index = query_text.find(projection_marker)
          if projection_index < 0:
              raise RuntimeError("Student Finance projection insertion point was not found.")
          visibility_helpers = dedent('''\
                  private static bool IsStudentVisible(Enrollment value)
                  {
                      return value.Status != EnrollmentStatus.Unspecified
                          && value.Status != EnrollmentStatus.Draft;
                  }

                  private static bool IsStudentVisible(TuitionAssessment value)
                  {
                      return value.Status == TuitionAssessmentStatus.Posted
                          || value.Status == TuitionAssessmentStatus.Cancelled;
                  }

                  private static bool IsStudentVisible(Payment value)
                  {
                      return value.Status == PaymentStatus.Posted
                          || value.Status == PaymentStatus.Voided;
                  }

                  private static bool IsStudentVisible(FinancialAdjustment value)
                  {
                      return value.Status == FinancialAdjustmentStatus.Posted;
                  }

                  private static bool IsStudentVisible(ScholarshipAward value)
                  {
                      return value.Status == ScholarshipAwardStatus.Approved
                          || value.Status == ScholarshipAwardStatus.Applied
                          || value.Status == ScholarshipAwardStatus.Cancelled;
                  }

          ''')
          query_text = query_text[:projection_index] + visibility_helpers + query_text[projection_index:]
          query_path.write_text(query_text, encoding="utf-8")

          test_source = dedent(r'''\
          using System;
          using System.IO;
          using System.Linq;
          using System.Text.Json;

          using Microsoft.VisualStudio.TestTools.UnitTesting;

          using IUIS.Application.Authorization;
          using IUIS.Application.Orchestration;
          using IUIS.Domain.Academic;
          using IUIS.Domain.Common;
          using IUIS.Domain.Finance;
          using IUIS.Domain.Identity;
          using IUIS.Infrastructure.Bootstrap;
          using IUIS.Infrastructure.Composition;
          using IUIS.Infrastructure.Persistence;

          namespace IUIS.Tests
          {
              [TestClass]
              public sealed class Pass11CorrectiveClosureTests
              {
                  private static readonly DateTime Now =
                      new DateTime(2026, 7, 21, 1, 0, 0, DateTimeKind.Utc);

                  [TestMethod]
                  public void PersistedRecordSchemaVersionMustBeExactlyOne()
                  {
                      var mapper = new PaymentJsonMapper();
                      var options = JsonOptions();
                      foreach (var version in new[] { 0, -1, 2, 99 })
                      {
                          var record = new PersistedPaymentRecord
                          {
                              RecordSchemaVersion = version
                          };
                          var json = JsonSerializer.SerializeToElement(record, options);
                          Assert.ThrowsException<InvalidOperationException>(() =>
                              mapper.FromJson(json, options),
                              "Schema version " + version + " must fail closed.");
                      }
                  }

                  [TestMethod]
                  public void SpecializedMapperWritesSchemaVersionOne()
                  {
                      var json = new PaymentJsonMapper().ToJson(
                          CreatePostedPayment(
                              "PAY-2026-000601",
                              "ASM-2026-000601",
                              "STU-2026-000601"),
                          JsonOptions());

                      Assert.AreEqual(
                          1,
                          json.GetProperty("recordSchemaVersion").GetInt32());
                  }

                  [TestMethod]
                  public void PaymentPostingRejectsStaleAssessmentEntityVersionBeforeIdentifierAllocation()
                  {
                      WithBootstrap((root, bootstrap) =>
                      {
                          var composition = new IuisCompositionRoot(root);
                          var assessment = CreatePostedAssessment(
                              "ASM-2026-000601",
                              "ENR-2026-000601",
                              "STU-2026-000601");
                          composition.TuitionAssessments.Write(
                              new[] { assessment },
                              0,
                              bootstrap.AdministratorUserId);
                          var service = CreatePaymentPostingService(composition);

                          Assert.ThrowsException<InvalidOperationException>(() =>
                              service.Post(
                                  "SES-2026-000601",
                                  "token",
                                  PaymentRequest(
                                      assessment,
                                      assessment.Version - 1L),
                                  Now.AddHours(1)));

                          Assert.AreEqual(0, composition.Payments.Read().Records.Count);
                          Assert.AreEqual(
                              "PAY-2026-000001",
                              composition.IdentifierAllocator.Allocate(
                                  "PAY",
                                  2026,
                                  bootstrap.AdministratorUserId));
                          Assert.AreEqual(
                              "PAL-2026-000001",
                              composition.IdentifierAllocator.Allocate(
                                  "PAL",
                                  2026,
                                  bootstrap.AdministratorUserId));
                          Assert.AreEqual(
                              "RCT-2026-000001",
                              composition.IdentifierAllocator.Allocate(
                                  "RCT",
                                  2026,
                                  bootstrap.AdministratorUserId));
                      });
                  }

                  [TestMethod]
                  public void PaymentPostingAcceptsMatchingAssessmentEntityVersion()
                  {
                      WithBootstrap((root, bootstrap) =>
                      {
                          var composition = new IuisCompositionRoot(root);
                          var assessment = CreatePostedAssessment(
                              "ASM-2026-000602",
                              "ENR-2026-000602",
                              "STU-2026-000602");
                          composition.TuitionAssessments.Write(
                              new[] { assessment },
                              0,
                              bootstrap.AdministratorUserId);

                          var result = CreatePaymentPostingService(composition).Post(
                              "SES-2026-000602",
                              "token",
                              PaymentRequest(assessment, assessment.Version),
                              Now.AddHours(1));

                          var stored = composition.Payments.Read().Records.Single();
                          Assert.AreEqual(PaymentStatus.Posted, stored.Status);
                          Assert.AreEqual(assessment.Id, stored.Allocations.Single().AssessmentId);
                          Assert.AreEqual(result.ReceiptNumber, stored.ReceiptNumber);
                          Assert.AreEqual(assessment.Version, 3L);
                      });
                  }

                  [TestMethod]
                  public void StudentFinanceProjectionExcludesUnreleasedLifecycleStates()
                  {
                      WithBootstrap((root, bootstrap) =>
                      {
                          const string studentId = "STU-2026-000701";
                          var composition = new IuisCompositionRoot(root);
                          var draftEnrollment = CreateDraftEnrollment(
                              "ENR-2026-000701",
                              studentId);
                          var approvedEnrollment = CreateApprovedEnrollment(
                              "ENR-2026-000702",
                              studentId);
                          var draftAssessment = CreateDraftAssessment(
                              "ASM-2026-000701",
                              draftEnrollment.Id,
                              studentId,
                              "USD");
                          var postedAssessment = CreatePostedAssessment(
                              "ASM-2026-000702",
                              approvedEnrollment.Id,
                              studentId);
                          var draftPayment = CreateDraftPayment(
                              "PAY-2026-000701",
                              studentId,
                              "USD");
                          var postedPayment = CreatePostedPayment(
                              "PAY-2026-000702",
                              postedAssessment.Id,
                              studentId);
                          var preparedAdjustment = CreatePreparedAdjustment(
                              "FAD-2026-000701",
                              draftAssessment.Id,
                              studentId,
                              "USD");
                          var postedAdjustment = CreatePostedAdjustment(
                              "FAD-2026-000702",
                              postedAssessment.Id,
                              studentId);
                          var preparedScholarship = CreatePreparedScholarship(
                              "SAW-2026-000701",
                              studentId,
                              "USD");
                          var approvedScholarship = CreateApprovedScholarship(
                              "SAW-2026-000702",
                              studentId);

                          composition.Enrollments.Write(
                              new[] { draftEnrollment, approvedEnrollment },
                              0,
                              bootstrap.AdministratorUserId);
                          composition.TuitionAssessments.Write(
                              new[] { draftAssessment, postedAssessment },
                              0,
                              bootstrap.AdministratorUserId);
                          composition.Payments.Write(
                              new[] { draftPayment, postedPayment },
                              0,
                              bootstrap.AdministratorUserId);
                          composition.FinancialAdjustments.Write(
                              new[] { preparedAdjustment, postedAdjustment },
                              0,
                              bootstrap.AdministratorUserId);
                          composition.ScholarshipAwards.Write(
                              new[] { preparedScholarship, approvedScholarship },
                              0,
                              bootstrap.AdministratorUserId);

                          var service = new StudentFinanceQueryService(
                              new SessionAwareRequestExecutor(
                                  new FixedPrincipalProvider(StudentPrincipal(
                                      studentId,
                                      "student.finance.read")),
                                  new PermissionResolver()),
                              composition.Enrollments,
                              composition.TuitionAssessments,
                              composition.Payments,
                              composition.FinancialAdjustments,
                              composition.ScholarshipAwards);
                          var result = service.GetOwnOverview(
                              "SES-2026-000701",
                              "token",
                              Now.AddHours(2));

                          Assert.AreEqual("PHP", result.CurrencyCode);
                          Assert.AreEqual(1, result.Enrollments.Count);
                          Assert.AreEqual(approvedEnrollment.Id, result.Enrollments.Single().EnrollmentId);
                          Assert.AreEqual(1, result.Assessments.Count);
                          Assert.AreEqual(postedAssessment.Id, result.Assessments.Single().AssessmentId);
                          Assert.AreEqual(1, result.Payments.Count);
                          Assert.AreEqual(postedPayment.Id, result.Payments.Single().PaymentId);
                          Assert.AreEqual(1, result.Scholarships.Count);
                          Assert.AreEqual(approvedScholarship.Id, result.Scholarships.Single().ScholarshipAwardId);
                          Assert.AreEqual(1500m, result.PostedAssessmentTotal);
                          Assert.AreEqual(100m, result.PostedAdjustmentCreditTotal);
                          Assert.AreEqual(1500m, result.PostedPaymentTotal);
                          Assert.AreEqual(-100m, result.Balance);
                      });
                  }

                  [TestMethod]
                  public void PostedPaymentRejectedMutationIsExceptionAtomic()
                  {
                      var payment = CreatePostedPayment(
                          "PAY-2026-000801",
                          "ASM-2026-000801",
                          "STU-2026-000801");
                      var version = payment.Version;
                      var updatedAtUtc = payment.UpdatedAtUtc;
                      var updatedByUserId = payment.UpdatedByUserId;
                      var receiptNumber = payment.ReceiptNumber;
                      var allocationId = payment.Allocations.Single().AllocationId;
                      var allocatedAmount = payment.AllocatedAmount.Amount;

                      Assert.ThrowsException<DomainValidationException>(() =>
                          payment.AddAllocation(
                              new PaymentAllocation(
                                  "PAL-2026-000802",
                                  "ASM-2026-000802",
                                  Money.PhilippinePeso(1m)),
                              Now.AddHours(3),
                              "USR-2026-000001"));

                      Assert.AreEqual(PaymentStatus.Posted, payment.Status);
                      Assert.AreEqual(version, payment.Version);
                      Assert.AreEqual(updatedAtUtc, payment.UpdatedAtUtc);
                      Assert.AreEqual(updatedByUserId, payment.UpdatedByUserId);
                      Assert.AreEqual(receiptNumber, payment.ReceiptNumber);
                      Assert.AreEqual(1, payment.Allocations.Count);
                      Assert.AreEqual(allocationId, payment.Allocations.Single().AllocationId);
                      Assert.AreEqual(allocatedAmount, payment.AllocatedAmount.Amount);
                  }

                  [TestMethod]
                  public void PostedFinancialAdjustmentRejectedMutationIsExceptionAtomic()
                  {
                      var adjustment = CreatePostedAdjustment(
                          "FAD-2026-000801",
                          "ASM-2026-000801",
                          "STU-2026-000801");
                      var version = adjustment.Version;
                      var updatedAtUtc = adjustment.UpdatedAtUtc;
                      var updatedByUserId = adjustment.UpdatedByUserId;
                      var postedAtUtc = adjustment.PostedAtUtc;
                      var postedByUserId = adjustment.PostedByUserId;
                      var reason = adjustment.Reason;
                      var amount = adjustment.Amount.Amount;

                      Assert.ThrowsException<DomainValidationException>(() =>
                          adjustment.CancelPrepared(
                              "A posted adjustment cannot be cancelled as prepared.",
                              Now.AddHours(3),
                              "USR-2026-000001"));

                      Assert.AreEqual(FinancialAdjustmentStatus.Posted, adjustment.Status);
                      Assert.AreEqual(version, adjustment.Version);
                      Assert.AreEqual(updatedAtUtc, adjustment.UpdatedAtUtc);
                      Assert.AreEqual(updatedByUserId, adjustment.UpdatedByUserId);
                      Assert.AreEqual(postedAtUtc, adjustment.PostedAtUtc);
                      Assert.AreEqual(postedByUserId, adjustment.PostedByUserId);
                      Assert.AreEqual(reason, adjustment.Reason);
                      Assert.AreEqual(amount, adjustment.Amount.Amount);
                  }

                  private static PaymentPostingService CreatePaymentPostingService(
                      IuisCompositionRoot composition)
                  {
                      return new PaymentPostingService(
                          new SessionAwareRequestExecutor(
                              new FixedPrincipalProvider(AdminPrincipal(
                                  "finance.payment.post")),
                              new PermissionResolver()),
                          composition.TuitionAssessments,
                          composition.Payments,
                          composition.Transactions,
                          composition.IdentifierAllocator);
                  }

                  private static PaymentPostingRequest PaymentRequest(
                      TuitionAssessment assessment,
                      long expectedAssessmentEntityVersion)
                  {
                      return new PaymentPostingRequest
                      {
                          ExpectedAssessmentRepositoryRevision = 1,
                          ExpectedPaymentRepositoryRevision = 0,
                          StudentId = assessment.StudentId,
                          AcademicPeriodId = assessment.AcademicPeriodId,
                          Amount = 1500m,
                          CurrencyCode = "PHP",
                          Method = PaymentMethod.Cash,
                          ReceivedAtUtc = Now.AddMinutes(30),
                          Allocations = new[]
                          {
                              new PaymentAllocationInput
                              {
                                  AssessmentId = assessment.Id,
                                  ExpectedAssessmentEntityVersion =
                                      expectedAssessmentEntityVersion,
                                  Amount = 1500m
                              }
                          }
                      };
                  }

                  private static Enrollment CreateDraftEnrollment(
                      string id,
                      string studentId)
                  {
                      return new Enrollment(
                          id,
                          studentId,
                          "APD-2026-000001",
                          "CRS-2026-000001",
                          "BSIT",
                          "Bachelor of Science in Information Technology",
                          "CUR-2026-000001",
                          "V1",
                          Now,
                          "USR-2026-000001");
                  }

                  private static Enrollment CreateApprovedEnrollment(
                      string id,
                      string studentId)
                  {
                      var value = CreateDraftEnrollment(id, studentId);
                      value.AddSubjectLine(
                          new EnrollmentSubjectLine(
                              "SUB-2026-000001",
                              "IT-332",
                              "Integrative Programming",
                              3m,
                              3,
                              1,
                              true,
                              "IT3-A"),
                          Now.AddMinutes(1),
                          "USR-2026-000001");
                      value.Submit(Now.AddMinutes(2), "USR-2026-000001");
                      value.BeginReview(Now.AddMinutes(3), "USR-2026-000001");
                      value.Approve(null, Now.AddMinutes(4), "USR-2026-000001");
                      return value;
                  }

                  private static TuitionAssessment CreateDraftAssessment(
                      string id,
                      string enrollmentId,
                      string studentId,
                      string currencyCode)
                  {
                      return new TuitionAssessment(
                          id,
                          studentId,
                          enrollmentId,
                          "APD-2026-000001",
                          currencyCode,
                          Now,
                          "USR-2026-000001");
                  }

                  private static TuitionAssessment CreatePostedAssessment(
                      string id,
                      string enrollmentId,
                      string studentId)
                  {
                      var value = CreateDraftAssessment(
                          id,
                          enrollmentId,
                          studentId,
                          "PHP");
                      value.AddChargeLine(
                          new AssessmentChargeLine(
                              "ACL-2026-000001",
                              "ACR-2026-000001",
                              "TUITION",
                              "Tuition charge",
                              AssessmentChargeCategory.Tuition,
                              Money.PhilippinePeso(1500m)),
                          Now.AddMinutes(1),
                          "USR-2026-000001");
                      value.Post(Now.AddMinutes(2), "USR-2026-000001");
                      return value;
                  }

                  private static Payment CreateDraftPayment(
                      string id,
                      string studentId,
                      string currencyCode)
                  {
                      return new Payment(
                          id,
                          studentId,
                          "APD-2026-000001",
                          new Money(50m, currencyCode),
                          PaymentMethod.Cash,
                          Now,
                          null,
                          Now,
                          "USR-2026-000001");
                  }

                  private static Payment CreatePostedPayment(
                      string id,
                      string assessmentId,
                      string studentId)
                  {
                      var value = new Payment(
                          id,
                          studentId,
                          "APD-2026-000001",
                          Money.PhilippinePeso(1500m),
                          PaymentMethod.Cash,
                          Now,
                          null,
                          Now,
                          "USR-2026-000001");
                      value.AddAllocation(
                          new PaymentAllocation(
                              "PAL-2026-000801",
                              assessmentId,
                              Money.PhilippinePeso(1500m)),
                          Now.AddMinutes(1),
                          "USR-2026-000001");
                      value.Post(
                          "RCT-2026-000801",
                          Now.AddMinutes(2),
                          "USR-2026-000001");
                      return value;
                  }

                  private static FinancialAdjustment CreatePreparedAdjustment(
                      string id,
                      string assessmentId,
                      string studentId,
                      string currencyCode)
                  {
                      return new FinancialAdjustment(
                          id,
                          studentId,
                          assessmentId,
                          FinancialAdjustmentDirection.Credit,
                          new Money(100m, currencyCode),
                          FinancialAdjustmentSourceKind.AdministrativeCorrection,
                          "ADM-2026-000001",
                          "Approved credit",
                          Now,
                          "USR-2026-000001");
                  }

                  private static FinancialAdjustment CreatePostedAdjustment(
                      string id,
                      string assessmentId,
                      string studentId)
                  {
                      var value = CreatePreparedAdjustment(
                          id,
                          assessmentId,
                          studentId,
                          "PHP");
