name: Run Pass 11 Corrective Patch

on:
  pull_request:
    branches:
      - main
    types:
      - opened
      - reopened
      - synchronize

permissions:
  contents: write

jobs:
  apply-corrective-patch:
    if: github.actor != 'github-actions[bot]'
    runs-on: ubuntu-latest
    steps:
      - name: Check out corrective branch
        uses: actions/checkout@v4
        with:
          ref: build/pass-11-corrective-closure
          fetch-depth: 0

      - name: Extract and apply the controlled patch
        shell: bash
        run: |
          python - <<'PY'
          from pathlib import Path

          source = Path('.github/workflows/pass11-corrective-patch.yml').read_text(encoding='utf-8').splitlines()
          start = source.index("          python - <<'PY'") + 1
          finish = source.index('          PY', start)
          lines = []
          for line in source[start:finish]:
              if not line.startswith('          '):
                  raise RuntimeError('Unexpected patch-script indentation.')
              lines.append(line[10:])

          script = '\n'.join(lines) + '\n'
          guard_start = script.index('mapper_path =')
          guard_end = script.index('command_path =', guard_start)
          corrected_guard = '''mapper_path = Path("src/IUIS.Infrastructure/Persistence/SpecializedAggregateJsonMappers.cs")
mapper_text = mapper_path.read_text(encoding="utf-8")
old_mapper_guard = ("if (record.RecordSchemaVersion != 0\\n"
                    "                && record.RecordSchemaVersion != CurrentRecordSchemaVersion)")
new_mapper_guard = "if (record.RecordSchemaVersion != CurrentRecordSchemaVersion)"
if mapper_text.count(old_mapper_guard) != 1:
    raise RuntimeError("Persisted record schema guard did not match the expected Pass 11 baseline.")
mapper_path.write_text(mapper_text.replace(old_mapper_guard, new_mapper_guard, 1), encoding="utf-8")

'''
          script = script[:guard_start] + corrected_guard + script[guard_end:]
          Path('/tmp/apply_pass11_corrective_patch.py').write_text(
              script,
              encoding='utf-8')
          PY
          python /tmp/apply_pass11_corrective_patch.py
          rm -f .github/workflows/pass11-corrective-pr-runner.yml

      - name: Commit corrective implementation
        shell: bash
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add -A
          git commit -m "fix(pass11): enforce corrective closure invariants"
          git push origin HEAD:build/pass-11-corrective-closure
