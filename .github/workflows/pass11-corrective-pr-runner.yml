name: Run Pass 11 Corrective Patch

on:
  pull_request:
    branches:
      - main
    types:
      - opened
      - reopened
      - synchronize

permissions:
  contents: write

jobs:
  apply-corrective-patch:
    if: github.actor != 'github-actions[bot]'
    runs-on: ubuntu-latest
    steps:
      - name: Check out corrective branch
        uses: actions/checkout@v4
        with:
          ref: build/pass-11-corrective-closure
          fetch-depth: 0

      - name: Extract and apply the controlled patch
        shell: bash
        run: |
          python - <<'PY'
          from pathlib import Path

          source = Path('.github/workflows/pass11-corrective-patch.yml').read_text(encoding='utf-8').splitlines()
          start = source.index("          python - <<'PY'") + 1
          finish = source.index('          PY', start)
          lines = []
          for line in source[start:finish]:
              if not line.startswith('          '):
                  raise RuntimeError('Unexpected patch-script indentation.')
              lines.append(line[10:])

          script = '\n'.join(lines) + '\n'
          guard_start = script.index('mapper_path =')
          guard_end = script.index('command_path =', guard_start)
          corrected_guard = (
              'mapper_path = Path("src/IUIS.Infrastructure/Persistence/SpecializedAggregateJsonMappers.cs")\n'
              'mapper_text = mapper_path.read_text(encoding="utf-8")\n'
              'old_mapper_guard = ("if (record.RecordSchemaVersion != 0\\n"\n'
              '                    "                && record.RecordSchemaVersion != CurrentRecordSchemaVersion)")\n'
              'new_mapper_guard = "if (record.RecordSchemaVersion != CurrentRecordSchemaVersion)"\n'
              'if mapper_text.count(old_mapper_guard) != 1:\n'
              '    raise RuntimeError("Persisted record schema guard did not match the expected Pass 11 baseline.")\n'
              'mapper_path.write_text(mapper_text.replace(old_mapper_guard, new_mapper_guard, 1), encoding="utf-8")\n\n'
          )
          script = script[:guard_start] + corrected_guard + script[guard_end:]
          Path('/tmp/apply_pass11_corrective_patch.py').write_text(
              script,
              encoding='utf-8')
          PY

          set +e
          python /tmp/apply_pass11_corrective_patch.py > /tmp/pass11-corrective-patch.log 2>&1
          patch_status=$?
          set -e
          cat /tmp/pass11-corrective-patch.log

          if [ "$patch_status" -ne 0 ]; then
            git reset --hard HEAD
            cp /tmp/pass11-corrective-patch.log .github/pass11-patch-error.txt
            echo "PATCH_FAILED=1" >> "$GITHUB_ENV"
          else
            rm -f .github/workflows/pass11-corrective-patch.yml
            rm -f .github/workflows/pass11-corrective-pr-runner.yml
            rm -f .github/pass11-patch-error.txt
            echo "PATCH_FAILED=0" >> "$GITHUB_ENV"
          fi

      - name: Commit patch result
        shell: bash
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add -A
          if git diff --cached --quiet; then
            exit 0
          fi
          if [ "$PATCH_FAILED" = "1" ]; then
            git commit -m "chore(pass11): capture corrective patch failure"
          else
            git commit -m "fix(pass11): enforce corrective closure invariants"
          fi
          git push origin HEAD:build/pass-11-corrective-closure
