name: Pass 12 Readiness Reconciliation

on:
  push:
    branches:
      - build/pass-12-student-service-persistence
    paths:
      - .github/workflows/pass12-readiness-reconciliation.yml

permissions:
  contents: write

jobs:
  reconcile:
    if: github.actor != 'github-actions[bot]'
    runs-on: windows-latest
    steps:
      - name: Check out exact branch
        uses: actions/checkout@v4
        with:
          ref: build/pass-12-student-service-persistence
          fetch-depth: 0

      - name: Reconcile readiness assertions and remove maintenance workflow
        shell: pwsh
        run: |
          $ErrorActionPreference = 'Stop'

          function Replace-ExactOnce {
              param(
                  [Parameter(Mandatory = $true)][string]$Path,
                  [Parameter(Mandatory = $true)][string]$Old,
                  [Parameter(Mandatory = $true)][string]$New
              )

              $content = [System.IO.File]::ReadAllText($Path).Replace("`r`n", "`n")
              $matches = [regex]::Matches($content, [regex]::Escape($Old)).Count
              if ($matches -ne 1) {
                  throw "Expected exactly one readiness block in $Path but found $matches."
              }

              $updated = $content.Replace($Old, $New)
              [System.IO.File]::WriteAllText(
                  $Path,
                  $updated,
                  [System.Text.UTF8Encoding]::new($false))
          }

          $pass9Old = "                Assert.AreEqual(`n                    11,`n                    readiness.Count(item =>`n                        item.Readiness`n                        == AggregateMapperReadiness.SpecializedMapperCompleted));`n                Assert.AreEqual(`n                    7,`n                    readiness.Count(item =>`n                        item.Readiness`n                        == AggregateMapperReadiness.DeferredWithExplicitReason));"
          $pass9New = "                Assert.AreEqual(`n                    13,`n                    readiness.Count(item =>`n                        item.Readiness`n                        == AggregateMapperReadiness.SpecializedMapperCompleted));`n                Assert.AreEqual(`n                    5,`n                    readiness.Count(item =>`n                        item.Readiness`n                        == AggregateMapperReadiness.DeferredWithExplicitReason));"
          Replace-ExactOnce `
              'tests/IUIS.Tests/Pass9ApplicationInfrastructureTests.cs' `
              $pass9Old `
              $pass9New

          $pass10Old = "        public void ReadinessCatalogActivatesExactlyElevenSpecializedMappers()`n        {`n            var records = AggregateMapperReadinessCatalog.All;`n            Assert.AreEqual(18, records.Count);`n            Assert.AreEqual(`n                11,`n                records.Count(item =>`n                    item.Readiness`n                    == AggregateMapperReadiness.SpecializedMapperCompleted));`n            Assert.AreEqual(`n                7,`n                records.Count(item =>`n                    item.Readiness`n                    == AggregateMapperReadiness.DeferredWithExplicitReason));"
          $pass10New = "        public void ReadinessCatalogActivatesExactlyThirteenSpecializedMappers()`n        {`n            var records = AggregateMapperReadinessCatalog.All;`n            Assert.AreEqual(18, records.Count);`n            Assert.AreEqual(`n                13,`n                records.Count(item =>`n                    item.Readiness`n                    == AggregateMapperReadiness.SpecializedMapperCompleted));`n            Assert.AreEqual(`n                5,`n                records.Count(item =>`n                    item.Readiness`n                    == AggregateMapperReadiness.DeferredWithExplicitReason));"
          Replace-ExactOnce `
              'tests/IUIS.Tests/Pass10CanonicalPersistenceTests.cs' `
              $pass10Old `
              $pass10New

          $activationOld = "                    `"assessments`",`n                    `"courses`"," 
          $activationNew = "                    `"assessments`",`n                    `"books`",`n                    `"borrowings`",`n                    `"courses`"," 
          Replace-ExactOnce `
              'tests/IUIS.Tests/Pass10ClosureIntegrityTests.cs' `
              $activationOld `
              $activationNew

          git rm '.github/workflows/pass12-readiness-reconciliation.yml'
          git config user.name 'github-actions[bot]'
          git config user.email '41898282+github-actions[bot]@users.noreply.github.com'
          git add `
              'tests/IUIS.Tests/Pass9ApplicationInfrastructureTests.cs' `
              'tests/IUIS.Tests/Pass10CanonicalPersistenceTests.cs' `
              'tests/IUIS.Tests/Pass10ClosureIntegrityTests.cs'
          git commit -m 'test(pass12): reconcile readiness assertions after Library activation'
          git push origin HEAD:build/pass-12-student-service-persistence
